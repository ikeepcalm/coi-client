name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found, generating..."
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Extract version from gradle.properties
        id: version
        run: |
          VERSION=$(grep "mod_version=" gradle.properties | cut -d'=' -f2)
          echo "VERSION=v${VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION_NUMBER=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build with Gradle
        run: ./gradlew build

      - name: Find built jar file
        id: find_jar
        run: |
          JAR_FILE=$(find build/libs -name "*.jar" -not -name "*-sources.jar" -not -name "*-dev.jar" | head -1)
          echo "JAR_PATH=${JAR_FILE}" >> $GITHUB_OUTPUT
          JAR_NAME=$(basename "${JAR_FILE}")
          echo "JAR_NAME=${JAR_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: 'Circle of Imagination Client ${{ steps.version.outputs.VERSION }}'
          body: |
            ## Circle of Imagination Client ${{ steps.version.outputs.VERSION }}
            
            ### Features
            - **6 Ability Slots**: Now supports up to 6 bound abilities (Z, X, C, V, B, N).
            - **Ability Wheel**: Quick access to your abilities using the **G** key.
            - **Visual Effects**: Implemented a robust system for server-triggered effects (Vignette, Heartbeat, Cracks, Glitch, Blood Rain, Frost, etc.).
            - **Customizable HUD**: Modern overlay with real-time cooldown tracking and smooth animations.
            - **In-game Configuration**: Easy-to-use screens for ability binding and HUD customization.
            
            ### Controls
            - **Z, X, C, V, B, N**: Use abilities in slots 1–6.
            - **G**: Open the interactive Ability Wheel.
            - **K**: Open the Ability Binding menu (where you can also access HUD settings).
            
            ### Installation
            1. Ensure you have [Fabric Loader](https://fabricmc.net/use/) installed for Minecraft 1.21.1+.
            2. Place this mod jar in your `.minecraft/mods` folder.
            3. (Optional) Install Fabric API if not already present.
            
            ### Requirements
            - Minecraft 1.21.1+
            - Fabric Loader
            - Circle of Imagination server-side plugin/mod
            
            ---
            **Build Artifact:** `${{ steps.find_jar.outputs.JAR_NAME }}`
          files: ${{ steps.find_jar.outputs.JAR_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}